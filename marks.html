<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Marks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">
    <h2>Student Marks System</h2>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="marks.html">Enter Marks</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="form-container">
    <div class="form-card">
        <h2>Enter Student Marks</h2>
        <p>Add marks quickly using the form below.</p>
        <form action="marks.php" method="POST">
            <label for="roll">Roll Number</label>
            <input id="roll" type="text" name="roll" placeholder="e.g. 101" required>

            <label for="math">Math</label>
            <input id="math" type="number" name="math" placeholder="0 - 100" min="0" max="100" required>

            <label for="science">Science</label>
            <input id="science" type="number" name="science" placeholder="0 - 100" min="0" max="100" required>

            <label for="english">English</label>
            <input id="english" type="number" name="english" placeholder="0 - 100" min="0" max="100" required>

            <button type="submit">Save Marks</button>
        </form>
    </div>
</div>

<footer class="site-footer">
    <p>&copy; 2026 Student Marks System. All rights reserved.</p>
</footer>

</body>
</html>
