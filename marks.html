<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Marks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">
    <h2>Student Marks System</h2>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="marks.html">Enter Marks</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="form-container">
    <div class="form-card">
        <h2>Enter Student Marks</h2>
        <p>Add marks quickly using the form below.</p>
        <form action="marks.php" method="POST">
            <label for="roll">Roll Number</label>
            <input id="roll" type="text" name="roll" placeholder="e.g. 101" required>

            <div id="courses-container" class="courses-container">
                <div class="course-row">
                    <div class="course-field">
                        <label for="course_name_1">Course Name</label>
                        <input id="course_name_1" type="text" name="course_names[]" placeholder="Enter course name" required>
                    </div>
                    <div class="course-field">
                        <label for="course_mark_1">Mark</label>
                        <input id="course_mark_1" type="number" name="course_marks[]" placeholder="0 - 100" min="0" max="100" required>
                    </div>
                </div>
            </div>

            <button id="add-course-btn" class="btn-secondary" type="button">+ Add Another Course</button>

            <button type="submit">Save Marks</button>
        </form>
    </div>
</div>

<footer class="site-footer">
    <p>&copy; 2026 Student Marks System. All rights reserved.</p>
</footer>

<script>
    const coursesContainer = document.getElementById('courses-container');
    const addCourseBtn = document.getElementById('add-course-btn');
    let courseIndex = 1;

    addCourseBtn.addEventListener('click', () => {
        courseIndex += 1;

        const row = document.createElement('div');
        row.className = 'course-row';
        row.innerHTML = `
            <div class="course-field">
                <label for="course_name_${courseIndex}">Course Name</label>
                <input id="course_name_${courseIndex}" type="text" name="course_names[]" placeholder="Enter course name" required>
            </div>
            <div class="course-field">
                <label for="course_mark_${courseIndex}">Mark</label>
                <input id="course_mark_${courseIndex}" type="number" name="course_marks[]" placeholder="0 - 100" min="0" max="100" required>
            </div>
        `;

        coursesContainer.appendChild(row);
    });
</script>

</body>
</html>
